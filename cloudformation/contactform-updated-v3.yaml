AWSTemplateFormatVersion: "2010-09-09"
Description: Contact form microservice using SNS, Lambda, and SSM Parameter Store. This template deploys a contact form, which allows users to hit an api endpoint in your code, and send an email to you via SNS.

Parameters:

  ContactEmail:
    Description: Email address that receives contact form submissions.
    Type: String

  ParameterPathPrefix:
    Type: String
    Default: /portfolio/contactform
    Description: SSM Parameter Store prefix used to share contact form values with other stacks.

Resources:

  ContactFormTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub contact-form-${AWS::StackName}

  ContactFormSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref ContactEmail
      Protocol: email
      TopicArn: !Ref ContactFormTopic

  ContactFormTopicArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub ${ParameterPathPrefix}/sns-topic-arn
      Type: String
      Value: !Ref ContactFormTopic
      Description: SNS topic ARN used by the contact form Lambda function.

  ContactFormFunctionArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub ${ParameterPathPrefix}/function-arn
      Type: String
      Value: !GetAtt ContactFormFunction.Arn
      Description: ARN for the contact form Lambda function.

  ContactFormFunctionNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub ${ParameterPathPrefix}/function-name
      Type: String
      Value: !Ref ContactFormFunction
      Description: Name for the contact form Lambda function.

  ContactFormLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      Path: /
      RoleName: !Sub contact-form-lambda-role-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ContactFormLambdaPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadContactFormConfigFromParameterStore
                Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ParameterPathPrefix}/sns-topic-arn
              - Sid: PublishToContactFormTopic
                Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref ContactFormTopic
              - Sid: LambdaLogging
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*

  ContactFormFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - ContactFormTopicArnParameter
    Properties:
      FunctionName: ContactFormFunction
      Handler: index.lambda_handler
      Runtime: python3.12
      Role: !GetAtt ContactFormLambdaRole.Arn
      MemorySize: 128
      Timeout: 30
      Environment:
        Variables:
          SNS_TOPIC_ARN_PARAMETER: !Sub ${ParameterPathPrefix}/sns-topic-arn
      Code:
        ZipFile: |
          import boto3
          import json
          import logging
          import os

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          ssm_client = boto3.client("ssm")
          sns_client = boto3.client("sns")

          def response(status_code, body):
              return {
                  "statusCode": status_code,
                  "headers": {
                      "Content-Type": "application/json",
                      "Access-Control-Allow-Origin": "*",
                      "Access-Control-Allow-Headers": "*",
                      "Access-Control-Allow-Methods": "POST,OPTIONS"
                  },
                  "body": json.dumps(body)
              }

          def lambda_handler(event, context):
              logger.info("Received event: %s", json.dumps(event))

              try:
                  method = event.get("requestContext", {}).get("http", {}).get("method", "POST")
                  if method == "OPTIONS":
                      return response(200, {"message": "CORS preflight successful"})

                  if method != "POST":
                      return response(405, {"error": "Method not allowed"})

                  body = event.get("body") or "{}"
                  form_data = json.loads(body)

                  name = form_data.get("name", "")
                  email = form_data.get("email", "")
                  message_text = form_data.get("message", "")

                  if not name or not email or not message_text:
                      return response(400, {"error": "name, email, and message are required"})

                  topic_parameter_name = os.environ["SNS_TOPIC_ARN_PARAMETER"]
                  parameter = ssm_client.get_parameter(Name=topic_parameter_name)
                  topic_arn = parameter["Parameter"]["Value"]

                  message = (
                      "New contact form submission:\n"
                      f"Name: {name}\n"
                      f"Email: {email}\n"
                      f"Message: {message_text}"
                  )

                  sns_client.publish(
                      TopicArn=topic_arn,
                      Message=message,
                      Subject="New Contact Form Submission"
                  )

                  return response(200, {"message": "Thank you for your submission!"})

              except json.JSONDecodeError:
                  return response(400, {"error": "Request body must be valid JSON"})
              except Exception:
                  logger.exception("Error processing contact form submission")
                  return response(500, {"error": "Error processing your submission"})

Outputs:

  ContactFormTopicArn:
    Description: SNS topic ARN used by the contact form service.
    Value: !Ref ContactFormTopic

  ContactFormFunctionName:
    Description: Contact form Lambda function name.
    Value: !Ref ContactFormFunction

  ContactFormFunctionArn:
    Description: Contact form Lambda function ARN.
    Value: !GetAtt ContactFormFunction.Arn

  ParameterPathPrefix:
    Description: SSM Parameter Store path prefix used by dependent stacks.
    Value: !Ref ParameterPathPrefix
