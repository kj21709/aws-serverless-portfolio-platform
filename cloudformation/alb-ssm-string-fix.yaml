AWSTemplateFormatVersion: '2010-09-09'
Description: Public Application Load Balancer stack for portfolio EC2 web servers.

Parameters:
  ProjectName:
    Type: String
    Default: portfolio
  EnvironmentName:
    Type: String
    Default: prod
  VpcId:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /portfolio/network/vpc-id
  PublicSubnetIds:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /portfolio/network/public-subnet-ids
  CertificateArn:
    Type: String
    Description: ACM certificate ARN for homenub.com in the same Region as the ALB.
  AllowedHttpCidr:
    Type: String
    Default: 0.0.0.0/0
  AllowedHttpsCidr:
    Type: String
    Default: 0.0.0.0/0

Resources:
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow public web traffic to ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedHttpCidr
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref AllowedHttpsCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-alb-sg

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-${EnvironmentName}-alb
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets: !Split [",", !Ref PublicSubnetIds]
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-alb

  WebTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-${EnvironmentName}-web-tg
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: 80
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      Matcher:
        HttpCode: '200-399'
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-web-tg

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTPS
      Port: 443
      Certificates:
        - CertificateArn: !Ref CertificateArn
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebTargetGroup

  AlbSecurityGroupParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/alb/security-group-id
      Type: String
      Value: !Ref ALBSecurityGroup

  AlbDnsNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/alb/dns-name
      Type: String
      Value: !GetAtt ApplicationLoadBalancer.DNSName

  AlbCanonicalHostedZoneIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/alb/canonical-hosted-zone-id
      Type: String
      Value: !GetAtt ApplicationLoadBalancer.CanonicalHostedZoneID

  WebTargetGroupArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/alb/web-target-group-arn
      Type: String
      Value: !Ref WebTargetGroup

Outputs:
  ALBDNSName:
    Value: !GetAtt ApplicationLoadBalancer.DNSName
  ALBSecurityGroupId:
    Value: !Ref ALBSecurityGroup
  WebTargetGroupArn:
    Value: !Ref WebTargetGroup
